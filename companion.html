<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rabbit Hole</title>
    <link rel="icon" type="image" href="img/icon-128.png" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 20px;
        background: #111;
        color: #eee;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
      }
      th, td {
        border: 1px solid #444;
        padding: 8px 12px;
        text-align: left;
      }
      th {
        background: #222;
      }
      button {
        margin-top: 10px;
        padding: 6px 12px;
        background: #444;
        color: #eee;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.2s;
      }
      button:hover {
        background: #666;
      }
      button.active {
        background: #0066cc;
        color: white;
      }
      .view-selector {
        display: flex;
        gap: 8px;
        margin: 15px 0;
        flex-wrap: wrap;
      }
      .view-selector button {
        margin-top: 0;
      }
      #log {
        margin-top: 20px;
        font-size: 12px;
        white-space: pre-wrap;
        background: #000;
        padding: 10px;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>Rabbit Hole</h1>
    <p>Time is tracked every active tab.</p>

    <div class="view-selector">
      <button class="view-btn active" data-view="today">Today</button>
      <button class="view-btn" data-view="week">Last 7 Days</button>
      <button class="view-btn" data-view="all">All Time</button>
    </div>

    <h2>Art Time!</h2>

    <canvas id="artCanvas" width="800" height="200"></canvas>

    <h2>Time spent on domains</h2>

    <div style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
      <button id="reset">Reset</button>
      <button id="refresh">Refresh</button>
    </div>

    <table id="table">
      <thead>
        <tr>
          <th>Domain</th>
          <th>Time spent (minutes)</th>
          <th>Time spent (hours)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Debug log</h2>
    <div id="log"></div>

    <script src="companion.js"></script>
  </body>
</html>
