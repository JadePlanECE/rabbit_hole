<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rabbit Hole</title>
    <link rel="icon" type="image" href="img/icon-128.png" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 20px;
        background: #111;
        color: #eee;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
      }
      th, td {
        border: 1px solid #444;
        padding: 8px 12px;
        text-align: left;
      }
      th {
        background: #222;
      }
      button {
        margin-top: 10px;
        padding: 6px 12px;
        background: #444;
        color: #eee;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #666;
      }
      #log {
        margin-top: 20px;
        font-size: 12px;
        white-space: pre-wrap;
        background: #000;
        padding: 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Rabbit Hole</h1>
    <p>Time is tracked every <strong>5 seconds</strong> while a tab is active.</p>

    <h2>Art Time!</h2>

    <p>Coming...</p>

    <h2>Time spent on domains</h2>

    <button id="refresh">Refresh</button>
    <button id="reset">Reset</button>

    <table id="table">
      <thead>
        <tr>
          <th>Domain</th>
          <th>Time spent (seconds)</th>
          <th>Time spent (minutes)</th>
          <th>Time spent (hours)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Debug log</h2>
    <div id="log"></div>

    <script src="companion.js"></script>
  </body>
</html>
